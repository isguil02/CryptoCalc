<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Lookup</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Crypto Lookup</h1>

<div class="search">
    <input id="cryptoID" placeholder="Enter Crypto ID (e.g., bitcoin)" />
    <button onclick="loadCrypto()">Search</button>
</div>

<p id="status"></p>

<div id="cryptoCard" class="card hidden">
    <img id="cryptoImage" src="" alt="Crypto image" />
    <h2 id="CryptoName"></h2>
    <table>
        <tbody>
        <tr>
            <th>Current Price</th>
            <td id="cryptoPrice"></td>
        </tr>
        <tr>
            <th>Market Cap</th>
            <td id="cryptoMarketCap"></td>
        </tr>
        <tr>
            <th>Market Cap Rank</th>
            <td id="cryptoMarketCapRank"></td>
        </tr>
        <tr>
            <th>Symbol</th>
            <td id="cryptoSymbol"></td>
        </tr>
        <tr style="height: 2em;">
            <!-- Used AI to figure out that I need to add rowspan to the High Low 24 hr header -->
            <th rowspan="2">High Low 24 hr</th>
            <td id="cryptoHigh"></td>
        </tr>
        <tr style="height: 2em;">
            <td id="cryptoLow"></td>
        </tr>
        </tbody>
    </table>
</div>


<script src="app.js"></script>
</body>
</html>
